# ============================================================
#  CONFIGURACIÓN SQLITE — Spring Boot 3.x
#  Archivo: src/main/resources/application.properties
# ============================================================

server.port=8080
spring.application.name=catalog

# ── Base de datos SQLite ──────────────────────────────────
# El archivo catalog.db se crea automáticamente en la raíz
# del proyecto cuando arranca la aplicación.
spring.datasource.url=jdbc:sqlite:catalog.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────
# SQLite no tiene un dialecto oficial en Hibernate moderno;
# usamos el dialecto genérico o el de la comunidad (ver build.gradle).
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none

# Ejecuta el schema.sql al inicio (crea tablas si no existen)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# Muestra el SQL generado en consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── CORS (para el frontend HTML estático) ────────────────
# Si usas CorsConfig en Java no es necesario aquí.
# Descomenta si quieres un enfoque rápido vía properties:
# spring.mvc.cors.allowed-origins=*
